services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bdaytracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: bdaytracker
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdaytracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_POSTGRES_DSN: "host=postgres port=5432 user=bdaytracker password=${POSTGRES_PASSWORD:-changeme} dbname=bdaytracker sslmode=disable"
      DB_NAME: bdaytracker
      DB_MAX_OPEN_CONNECTIONS: 10
      DB_MAX_IDLE_CONNECTIONS: 5
      DB_MAX_CONNECTION_LIFETIME: 5m
      MAILING_START_HOUR: 7
      MAILING_END_HOUR: 10
      MAILING_MAX_REMINDERS_PER_SECOND: 15
    restart: always

volumes:
  postgres-data:
